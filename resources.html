  <!-- Styles -->

<body class="with-grid">

  <a href="#main" class="skip-link">Skip to content</a>

  <nav id="site-nav" role="navigation" aria-label="Main navigation"></nav>

  <main id="main">
    <!-- Phase 6: Resources page content built here -->
    <!-- Document card grid — one-pager placeholder in v1 -->
  </main>

  <footer id="site-footer"></footer>

  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js" defer></script>

  <script src="/js/nav.js" defer></script>
  <script src="/js/parallax.js" defer></script>
  <script type="module">
    import { hydrate, renderDocCard } from '/js/render.js';
    import { content } from '/content/resources.js';
    document.addEventListener('DOMContentLoaded', () => {
      hydrate(content);
      const gridEl = document.getElementById('doc-grid');
      if (gridEl) {
        gridEl.innerHTML = content.documents.map(renderDocCard).join('');
      }
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
