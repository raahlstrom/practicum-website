<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources — [PLACEHOLDER NAME]</title>
  <meta name="description" content="Downloadable materials for educators, nonprofits, and partners working with Scholarship Granting Organizations.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/pages/resources.css">
</head>
<body class="with-grid">

  <a href="#main" class="skip-link">Skip to content</a>
  <nav id="site-nav" role="navigation" aria-label="Main navigation"></nav>

  <main id="main">

    <!-- ════════════════════════════════════════════════════════════
         RESOURCES INTRO
         ════════════════════════════════════════════════════════════ -->
    <section class="page-section section-resources-intro"
             id="section-resources-intro"
             aria-labelledby="resources-h1">
      <div class="container">

        <div class="spec-header">
          <span class="spec-num">§5</span>
          <span class="spec-sep">—</span>
          <span class="spec-title">Resources</span>
        </div>

        <h1 class="resources-headline" id="resources-h1" data-content="intro.headline"></h1>
        <p class="resources-body" data-content="intro.body"></p>

      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         DOCUMENT GRID
         ════════════════════════════════════════════════════════════ -->
    <section class="page-section section-doc-grid"
             id="section-doc-grid"
             aria-label="Available documents">
      <div class="container">
        <div class="doc-grid" id="doc-grid"></div>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"
          integrity="sha384-wkxmY9HYHJVzx0oZ7k8stpLQ7g7ogSqBha75ozCZmxFadwtaIw5dzXKVWWfi9I36"
          crossorigin="anonymous" defer></script>

  <script src="/js/nav.js" defer></script>
  <script src="/js/parallax.js" defer></script>

  <script type="module">
    import { hydrate, renderDocCard, initScrollReveal } from '/js/render.js';
    import { content } from '/content/resources.js';

    document.addEventListener('DOMContentLoaded', () => {
      hydrate(content);

      const gridEl = document.getElementById('doc-grid');
      if (gridEl) {
        gridEl.innerHTML = content.documents.map(renderDocCard).join('');
      }

      initScrollReveal();
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
