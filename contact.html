<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in Touch — [PLACEHOLDER NAME]</title>
  <meta name="description" content="Connect with [PLACEHOLDER NAME] — we work with nonprofit partners, school districts, funders, and educators building wraparound service SGOs.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/pages/contact.css">
</head>
<body class="with-grid">

  <a href="#main" class="skip-link">Skip to content</a>
  <nav id="site-nav" role="navigation" aria-label="Main navigation"></nav>

  <main id="main">

    <!-- ════════════════════════════════════════════════════════════
         CONTACT STATEMENT
         ════════════════════════════════════════════════════════════ -->
    <section class="page-section section-contact-statement"
             id="section-contact-statement"
             aria-labelledby="contact-h1">
      <div class="container">

        <div class="spec-header">
          <span class="spec-num">§6</span>
          <span class="spec-sep">—</span>
          <span class="spec-title">Get in Touch</span>
        </div>

        <div class="contact-layout">

          <div>
            <h1 class="contact-headline" id="contact-h1" data-content="statement.headline"></h1>
            <p class="contact-body" data-content="statement.body"></p>
            <p class="contact-engagement-note" data-content="statement.engagementNote"></p>
          </div>

          <div>
            <!-- Intentionally open — can hold a visual element when assets arrive -->
          </div>

        </div>

      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         PEOPLE
         ════════════════════════════════════════════════════════════ -->
    <section class="page-section section-people"
             id="section-people"
             aria-label="Team members">
      <div class="container">

        <div class="spec-header">
          <span class="spec-num">—</span>
          <span class="spec-sep"></span>
          <span class="spec-title">Who We Are</span>
        </div>

        <div class="people-grid" id="people-grid" role="list"></div>

      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"
          integrity="sha384-wkxmY9HYHJVzx0oZ7k8stpLQ7g7ogSqBha75ozCZmxFadwtaIw5dzXKVWWfi9I36"
          crossorigin="anonymous" defer></script>

  <script src="/js/nav.js" defer></script>
  <script src="/js/parallax.js" defer></script>

  <script type="module">
    import { hydrate, renderPersonCard, initScrollReveal } from '/js/render.js';
    import { content } from '/content/contact.js';

    document.addEventListener('DOMContentLoaded', () => {
      hydrate(content);

      const peopleEl = document.getElementById('people-grid');
      if (peopleEl) {
        peopleEl.innerHTML = content.people.map(p =>
          `<div role="listitem">${renderPersonCard(p)}</div>`
        ).join('');
      }

      initScrollReveal();
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
